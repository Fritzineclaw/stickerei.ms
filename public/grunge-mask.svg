<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" preserveAspectRatio="none">
  <!--
    Grunge-Maske fuer das Hero-Video.
    Weiss (255) = sichtbar, Schwarz (0) = unsichtbar.
    feTurbulence erzeugt Noise, feComponentTransfer formt es zu weichen,
    unregelmaessigen Kanten, und eine radiale Vignette schaerft die Raender.
  -->
  <defs>
    <filter id="grunge" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="7" result="noise"/>
      <feComponentTransfer in="noise" result="grain">
        <feFuncA type="linear" slope="1.4" intercept="-0.18"/>
      </feComponentTransfer>
      <feComposite in="grain" in2="SourceGraphic" operator="in"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="70%" stop-color="white" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#vignette)" filter="url(#grunge)"/>
</svg>
