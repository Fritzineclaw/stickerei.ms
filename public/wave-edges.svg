<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="none">
  <!--
    Organische Wellenkanten an Ober- und Unterkante.
    Sinusoide Wellen via Bézier-Kurven (S = smooth cubic, kontinuierlich).
    Seiten (links/rechts) bleiben gerade.
    Eine dezente feTurbulence + feDisplacementMap-Verformung (scale 6)
    bricht die perfekte Sinus-Form leicht auf fuer natuerlichen Look.
    Weiss = sichtbar, alles ausserhalb = unsichtbar (Mask).
  -->
  <defs>
    <filter id="organic" x="-3%" y="-5%" width="106%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008 0.02" numOctaves="1" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <path d="
    M 0,40
    L 1200,40
    L 1200,560
    C 1100,590 1000,530 900,560
    S 700,590 600,560
    S 400,530 300,560
    S 100,590 0,560
    Z
  " fill="white" filter="url(#organic)"/>
</svg>
