<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="none">
  <!--
    Torn-Edges-Maske fuer .hero.
    Weiss = sichtbar, Schwarz = unsichtbar.
    Ein Rechteck (Mitte) wird durch feDisplacementMap mit feTurbulence-Noise
    an Ober- und Unterkante wellig verzerrt, sodass die Hero-Section
    aussieht wie abgerissenes Papier (links/rechts bleiben sauber gerade).
  -->
  <defs>
    <filter id="torn" x="-10%" y="-15%" width="120%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.025" numOctaves="3" seed="11" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="46" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <!-- Weisser Innenbereich: Rechteck mit 10px Abstand zu jeder Kante.
       Wird durch feDisplacementMap an allen 4 Seiten zerfranst. -->
  <rect x="0" y="0" width="600" height="400" fill="white" filter="url(#torn)"/>
</svg>
